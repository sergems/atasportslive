            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://atasportslive.com/#organization",
          "name": "ATA Sports Live",

            "https://twitter.com/ATASportsLive",
            "https://www.youtube.com/ATASportsLive"

        },

          "@type": "SportsOrganization",
          "@id": "https://atasportslive.com/#sportsorg",
          "name": "ATA Sports Live",
          "url": "https://atasportslive.com",
          "sport": ["Pool", "Boxing"],
          "description": "Live Pool and Boxing streaming with peer-to-peer betting exchange across Africa."
        }
