services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — persistent database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ata_db
      POSTGRES_USER: ata_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ata_user -d ata_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # API Server — Express 5 + WebSocket
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ata_user:${POSTGRES_PASSWORD}@db:5432/ata_db
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: "8080"
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy + static frontend files
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates (populated later with Certbot)
      - ./deploy/ssl:/etc/nginx/ssl:ro
      # Serve uploaded files directly for performance
      - uploads:/app/uploads:ro
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
