services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — persistent database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ata_db
      POSTGRES_USER: ata_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ata_user -d ata_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Migrate — applies drizzle-kit schema changes then exits
  # Run manually:  docker compose run --rm migrate
  # Runs automatically before the API on every  docker compose up
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://ata_user:${POSTGRES_PASSWORD}@db:5432/ata_db
    depends_on:
      db:
        condition: service_healthy
    # Run once and exit — never restart
    restart: "no"

  # ---------------------------------------------------------------------------
  # API Server — Express 5 + WebSocket
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ata_user:${POSTGRES_PASSWORD}@db:5432/ata_db
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PORT: "8080"
      NODE_ENV: production
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy + static frontend files
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Bind-mount the nginx config so swapping HTTP→HTTPS only needs a restart,
      # not a full image rebuild. Copy deploy/nginx-ssl.conf → deploy/nginx.conf
      # then run: docker compose restart nginx
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (populated later with Certbot)
      - ./deploy/ssl:/etc/nginx/ssl:ro
      # Let's Encrypt certificates (mounted after running certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Serve uploaded files directly for performance
      - uploads:/app/uploads:ro
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
