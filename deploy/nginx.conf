server {
    listen 80;
    server_name 173.230.131.210 atasportslive.com www.atasportslive.com;

    # Increase body size limit for file uploads
    client_max_body_size 50M;

    # Serve built frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy — forward to Express server
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy — required for real-time notifications
    location /ws {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        # Keep long-lived WS connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Uploaded files — proxy to API so the uploads volume is accessed once
    # ^~ prevents the static-asset regex below from hijacking /uploads/*.jpg etc.
    location ^~ /uploads/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # SPA fallback — serve index.html for all unmatched routes (wouter routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
