# =============================================================================
# ATA Sports Live — nginx HTTPS configuration
# Use this file AFTER the SSL certificate has been installed with Certbot.
# To activate:  cp deploy/nginx-ssl.conf deploy/nginx.conf
#               docker compose up -d nginx
# =============================================================================

# -----------------------------------------------------------------------------
# Redirect bare HTTP → HTTPS for the domain (not the IP)
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name atasportslive.com www.atasportslive.com;

    # Let's Encrypt HTTP-01 renewal challenge (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# Keep the bare IP accessible over HTTP (no SSL for raw IP addresses)
# Useful for admin / health checks before DNS is fully pointed.
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name 45.79.219.243;

    client_max_body_size 50M;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /uploads/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        expires            7d;
        add_header         Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — main site
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name atasportslive.com www.atasportslive.com;

    # --- SSL certificate (issued by Certbot / Let's Encrypt) -----------------
    ssl_certificate     /etc/letsencrypt/live/atasportslive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atasportslive.com/privkey.pem;

    # --- SSL hardening -------------------------------------------------------
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS — tell browsers to always use HTTPS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Security headers ----------------------------------------------------
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Gzip ----------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # --- Static assets (Vite content-hashed filenames) -----------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- API proxy -----------------------------------------------------------
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- WebSocket proxy -----------------------------------------------------
    location /ws {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- User-uploaded files -------------------------------------------------
    location ^~ /uploads/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # --- SPA fallback --------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
